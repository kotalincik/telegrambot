<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Стоматология - Админ-панель{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --success-color: #198754;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
        }
        
        body {
            background-color: #f8f9fa;
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-stat {
            border: none;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        
        .card-stat:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .bg-gradient-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .bg-gradient-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .bg-gradient-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .bg-gradient-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .sidebar {
            min-height: calc(100vh - 56px);
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .sidebar .nav-link {
            color: #495057;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 2px 10px;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: #e3f2fd;
            color: var(--primary-color);
        }
        
        .sidebar .nav-link i {
            margin-right: 10px;
        }
        
        .table-hover tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        .badge-status {
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-scheduled { background-color: #cff4fc; color: #055160; }
        .status-confirmed { background-color: #d1e7dd; color: #0f5132; }
        .status-completed { background-color: #e2e3e5; color: #41464b; }
        .status-cancelled { background-color: #f8d7da; color: #842029; }
        .status-no-show { background-color: #fff3cd; color: #664d03; }
        
        .specialization-therapist { background-color: #e3f2fd; color: #1565c0; }
        .specialization-surgeon { background-color: #fce4ec; color: #c2185b; }
        .specialization-orthodontist { background-color: #f3e5f5; color: #7b1fa2; }
        .specialization-orthopedist { background-color: #e8f5e9; color: #2e7d32; }
        .specialization-periodontist { background-color: #fff3e0; color: #ef6c00; }
        .specialization-pediatric { background-color: #e0f2f1; color: #00695c; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard/">
                <i class="bi bi-hospital-fill me-2"></i>
                Стоматология Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-white">
                            <i class="bi bi-calendar3 me-1"></i>
                            {{ today.strftime('%d.%m.%Y') if today else '' }}
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 px-0 sidebar">
                <div class="d-flex flex-column py-3">
                    <a href="/dashboard/" class="nav-link {% if request.url.path == '/dashboard/' %}active{% endif %}">
                        <i class="bi bi-speedometer2"></i> Обзор
                    </a>
                    <a href="/dashboard/appointments" class="nav-link {% if '/appointments' in request.url.path %}active{% endif %}">
                        <i class="bi bi-calendar-check"></i> Записи
                    </a>
                    <a href="/dashboard/doctors" class="nav-link {% if '/doctors' in request.url.path %}active{% endif %}">
                        <i class="bi bi-person-badge"></i> Врачи
                    </a>
                    <a href="/dashboard/patients" class="nav-link {% if '/patients' in request.url.path %}active{% endif %}">
                        <i class="bi bi-people"></i> Пациенты
                    </a>
                    <a href="/dashboard/services" class="nav-link {% if '/services' in request.url.path %}active{% endif %}">
                        <i class="bi bi-list-check"></i> Услуги
                    </a>
                    <a href="/dashboard/statistics" class="nav-link {% if '/statistics' in request.url.path %}active{% endif %}">
                        <i class="bi bi-graph-up"></i> Статистика
                    </a>
                    <hr class="mx-3">
                    <a href="/docs" target="_blank" class="nav-link">
                        <i class="bi bi-code-square"></i> API Docs
                    </a>
                </div>
            </div>
            
            <div class="col-md-10 py-4 px-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
